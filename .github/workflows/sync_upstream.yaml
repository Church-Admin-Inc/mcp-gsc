name: Sync with Upstream

on:
  schedule:
    # Run this workflow once a week on Sunday at midnight
    - cron: "0 0 * * 0"
  workflow_dispatch: # Allows manual triggering from the Actions tab

permissions:
  contents: write # Explicitly grant permission to push changes
  pull-requests: write # Needed to open a PR when the merge conflicts

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # CRITICAL: Fetches full history for the merge

    - name: Configure git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Add upstream repository
      run: git remote add upstream https://github.com/AminForou/mcp-gsc.git

    - name: Fetch upstream changes
      run: git fetch upstream

    - name: Attempt merge of upstream main branch
      id: merge
      # Note: Ensure the upstream's default branch is 'main'. If it is 'master', change 'upstream/main' to 'upstream/master'
      run: |
        if git merge upstream/main --no-edit; then
          echo "conflict=false" >> "$GITHUB_OUTPUT"
        else
          echo "conflict=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Push merged changes to origin
      if: steps.merge.outputs.conflict == 'false'
      run: git push origin main

    - name: Open a PR with the conflicted merge for manual resolution
      if: steps.merge.outputs.conflict == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        branch="sync/upstream-$(date -u +%Y-%m-%d)"
        git add -A
        git commit -m "Merge upstream/main (conflicts need manual resolution)"
        git push origin "HEAD:refs/heads/$branch"
        gh pr create \
          --title "Sync with upstream: conflicts need manual resolution" \
          --body "Automatic sync from upstream (AminForou/mcp-gsc) hit a merge conflict. This PR contains the conflict markers as committed — resolve them locally on this branch, then merge." \
          --base main \
          --head "$branch"
