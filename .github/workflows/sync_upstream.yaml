name: Sync with Upstream

on:
  schedule:
    # Run this workflow once a week on Sunday at midnight
    - cron: "0 0 * * 0"
  workflow_dispatch: # Allows manual triggering from the Actions tab

permissions:
  contents: write # Explicitly grant permission to push changes

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # CRITICAL: Fetches full history for the merge
        
    - name: Configure git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Add upstream repository
      run: git remote add upstream https://github.com/AminForou/mcp-gsc.git

    - name: Fetch upstream changes
      run: git fetch upstream

    - name: Merge upstream main branch
      # Note: Ensure the upstream's default branch is 'main'. If it is 'master', change 'upstream/main' to 'upstream/master'
      run: git merge upstream/main --no-edit

    - name: Push changes to origin
      run: git push origin main
